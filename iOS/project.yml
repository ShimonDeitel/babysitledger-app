name: Babysitledger
options:
  bundleIdPrefix: com.shimondeitel.babysitledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Babysitledger:
    type: application
    platform: iOS
    sources:
      - path: Babysitledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babysitledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Babysitledger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BabysitledgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BabysitledgerTests
      - path: Babysitledger.storekit
    dependencies:
      - target: Babysitledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babysitledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BabysitledgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BabysitledgerUITests
    dependencies:
      - target: Babysitledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babysitledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Babysitledger:
    build:
      targets:
        Babysitledger: all
        BabysitledgerTests: [test]
        BabysitledgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Babysitledger.storekit
    test:
      config: Debug
      storeKitConfiguration: Babysitledger.storekit
      targets:
        - BabysitledgerTests
        - BabysitledgerUITests
    archive:
      config: Release
